<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Ship Happens — Sell everything. Learn nothing.</title>
  <meta name="description" content="A satirical dropshipping idle game. Build the store, spin the ads, ride the algorithm, sell the company. Repeat.">
  <meta name="theme-color" content="#0b0e14">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ship Happens">
  <meta name="format-detection" content="telephone=no">
  <script>
    // Self-heal: a mixed-deploy module graph (stale-while-revalidate hazard)
    // can break boot with a TypeError. One shot per session: drop SW caches
    // (never localStorage saves) and reload clean.
    window.addEventListener('error', function () {
      if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
      if (sessionStorage.getItem('sh-selfheal')) return;
      sessionStorage.setItem('sh-selfheal', '1');
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        return Promise.all(rs.map(function (r) { return r.unregister(); }));
      }).then(function () { return caches.keys(); })
        .then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
        .then(function () { location.reload(); });
    }, { once: true });
  </script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/effects.css">
</head>
<body>
  <div id="game" class="game">
    <header id="kpi" class="kpi" aria-label="Key metrics"></header>
    <nav id="nav" class="nav" aria-label="Dashboard sections"></nav>
    <main id="stage" class="stage">
      <section id="panel-dashboard" class="stage-panel active"></section>
      <section id="panel-products" class="stage-panel"></section>
      <section id="panel-adstudio" class="stage-panel"></section>
      <section id="panel-upgrades" class="stage-panel"></section>
      <section id="panel-trends" class="stage-panel"></section>
      <section id="panel-guru" class="stage-panel"></section>
      <section id="panel-flexes" class="stage-panel"></section>
      <section id="panel-settings" class="stage-panel"></section>
    </main>
    <aside id="rail" class="rail" aria-hidden="true">
      <div id="next-goal" class="next-goal"></div>
      <div class="feed-head"><span>Live Orders</span><span id="feed-rate" class="num"></span></div>
      <div id="feed" class="feed"></div>
    </aside>
    <footer id="ticker" class="ticker" aria-hidden="true">
      <div id="ticker-track" class="ticker-track"></div>
    </footer>
  </div>

  <canvas id="fx" aria-hidden="true"></canvas>
  <div id="moment-root" aria-hidden="true"></div>
  <div id="banners" aria-live="polite"></div>
  <div id="toasts" aria-live="polite"></div>
  <div id="modal-root"></div>
  <div id="ceremony-root" aria-hidden="true"></div>
  <div id="flash" class="flash-overlay" aria-hidden="true"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
