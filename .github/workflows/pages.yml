name: Deploy to GitHub Pages

# The site is served from the gh-pages branch (Settings → Pages).
# Every push to main mirrors the tree into gh-pages — the game is zero-build,
# so the repo root IS the site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mirror main → gh-pages
        run: git push --force origin HEAD:gh-pages
